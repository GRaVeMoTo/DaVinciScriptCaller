# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Cache NuGet packages
      uses: actions/cache@v5.0.4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}
      continue-on-error: false

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}
      continue-on-error: false

    - name: Calculate SHA256 Hash
      if: success()
      id: hash
      shell: pwsh
      run: |
        $file = "${{ env.SOLUTION_FILE_PATH }}/x64/${{ env.BUILD_CONFIGURATION }}/DaVinciScriptCaller.exe"
        $hash = (Get-FileHash -Path $file -Algorithm SHA256).Hash
        echo "sha256=$hash" >> $env:GITHUB_OUTPUT
        echo "$hash" | Out-File -FilePath "${{ runner.temp }}/DaVinciScriptCaller.exe.sha256" -Encoding UTF8

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: DaVinciScriptCaller.exe
        path: |
          ${{env.SOLUTION_FILE_PATH}}/x64/${{env.BUILD_CONFIGURATION}}/DaVinciScriptCaller.exe
          ${{runner.temp}}/DaVinciScriptCaller.exe.sha256
        retention-days: 7

    - name: Create Release with Artifact and SHA256
      if: success() && startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{env.SOLUTION_FILE_PATH}}/x64/${{env.BUILD_CONFIGURATION}}/DaVinciScriptCaller.exe
          ${{runner.temp}}/DaVinciScriptCaller.exe.sha256
        body: |
          **SHA256 Checksum:**
          ```
          ${{ steps.hash.outputs.sha256 }}
          ```
          
          **How to verify:**
          ```powershell
          Get-FileHash DaVinciScriptCaller.exe -Algorithm SHA256
          ```
